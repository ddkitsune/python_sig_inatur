{% extends "base.html" %}

{% block title %}Nuevo Registro RTN - SIG-INATUR
<script>
    document.getElementById('rif-upload').addEventListener('change', async function (e) {
        const file = e.target.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('image', file);

        const btn = document.getElementById('scan-btn');
        const status = document.getElementById('scan-status');

        // UI State: Loading
        btn.disabled = true;
        status.style.display = 'block';

        try {
            const response = await fetch('/ia/scan_rif', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            if (data.error) {
                alert('Error al escanear: ' + data.error);
            } else {
                // Autocompletar campos
                if (data.rif) {
                    document.getElementsByName('rif')[0].value = data.rif;
                }
                if (data.razon_social) {
                    document.getElementsByName('razon_social')[0].value = data.razon_social;
                }

                // Notificar éxito
                status.innerHTML = '<i class="fas fa-check-circle" style="color: #10b981;"></i> ¡Datos extraídos con éxito!';
                setTimeout(() => {
                    status.style.display = 'none';
                    status.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Procesando imagen con IA...';
                }, 3000);
            }
        } catch (err) {
            alert('Error de conexión con el servicio de IA.');
        } finally {
            btn.disabled = false;
            e.target.value = ''; // Limpiar input
        }
    });
</script>
{% endblock %}

{% block content %}
<div class="header">
    <h1><i class="fas fa-plus" style="color: var(--primary);"></i> Nuevo Registro de Prestador</h1>
    <div class="actions">
        <a href="{{ url_for('providers.index') }}" class="btn btn-outline">Volver al Listado</a>
    </div>
</div>

<div class="card" style="margin-bottom: 2rem; border: 2px dashed var(--primary); background: #f0f9ff;">
    <div style="padding: 1.5rem; text-align: center;">
        <h3 style="color: var(--primary); margin-bottom: 0.5rem;"><i class="fas fa-magic"></i> Autocompletado con IA
        </h3>
        <p style="font-size: 0.9rem; color: #64748b; margin-bottom: 1.5rem;">Sube una foto del RIF para llenar los datos
            automáticamente.</p>

        <input type="file" id="rif-upload" accept="image/*" style="display: none;">
        <button type="button" class="btn" onclick="document.getElementById('rif-upload').click()" id="scan-btn">
            <i class="fas fa-camera"></i> Escanear RIF
        </button>

        <div id="scan-status" style="margin-top: 1rem; font-size: 0.85rem; display: none;">
            <i class="fas fa-circle-notch fa-spin"></i> Procesando imagen con IA...
        </div>
    </div>
</div>

<div class="card">
    <form action="{{ url_for('providers.create') }}" method="POST" id="provider-form">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Número de RTN</label>
                <input type="text" name="num_rtn" required
                    style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 0.5rem;"
                    placeholder="Ej: RTN-001">
            </div>
            <div class="form-group">
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">RIF</label>
                <input type="text" name="rif" required
                    style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 0.5rem;"
                    placeholder="Ej: J-12345678-9">
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Razón Social / Nombre
                    Comercial</label>
                <input type="text" name="razon_social" required
                    style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 0.5rem;">
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Dirección Fiscal</label>
                <textarea name="direccion" required
                    style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 0.5rem; min-height: 100px;"></textarea>
            </div>
            <div class="form-group">
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Teléfono de Contacto</label>
                <input type="text" name="telefono" required
                    style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 0.5rem;">
            </div>
            <div class="form-group">
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Correo Electrónico</label>
                <input type="email" name="email" required
                    style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 0.5rem;">
            </div>
            <div class="form-group">
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Categoría</label>
                <select name="category_id" required
                    style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 0.5rem;">
                    <option value="">Seleccione una categoría</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Municipio (Ubicación)</label>
                <select name="municipality_id" required
                    style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 0.5rem;">
                    <option value="">Seleccione un municipio</option>
                    {% for state in states %}
                    <optgroup label="{{ state.name }}">
                        {% for mun in state.municipalities %}
                        <option value="{{ mun.id }}">{{ mun.name }}</option>
                        {% endfor %}
                    </optgroup>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Estatus Legal</label>
                <select name="status" required
                    style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 0.5rem;">
                    <option value="activo">Activo</option>
                    <option value="vencido">Vencido</option>
                    <option value="tramite">En Trámite</option>
                </select>
            </div>
            <div class="form-group">
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Fecha de Vencimiento RTN</label>
                <input type="date" name="valid_until"
                    style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 0.5rem;">
            </div>
            <div class="form-group">
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Capacidad
                    (Aforo/Habitaciones)</label>
                <input type="number" name="capacity" value="0"
                    style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 0.5rem;">
            </div>
        </div>
        <div style="margin-top: 2rem; border-top: 1px solid #eee; padding-top: 1.5rem; text-align: right;">
            <button type="submit" class="btn">Guardar Prestador</button>
        </div>
    </form>
</div>
{% endblock %}
